<body class="former d-flex justify-content-center">

  <div id="loader">
    <div class="dumbbell"></div>
  </div>

  <!-- header -->

    <div class="card glass-card shadow-lg rounded-4">
      <div class="card-body p-4 p-md-5">
        <form id="registerForm">

          <div class="d-flex justify-content-center gap-4">
            <div class="col-md">

              <h2>Gym Details</h2>
              <div class="form-floating mb-3">
                <input type="text" name="name" class="form-control" placeholder="Gym Name" required />
                <label>Gym Name</label>
              </div>

              <div class="form-floating mb-3">
                <input type="text" name="slug" class="form-control" placeholder="Gym Slug (e.g. goldsgym)" required />
                <label>Gym Slug (e.g. goldsgym)</label>
              </div>

              <div class="form-floating mb-3">
                <input type="email" name="gymMail" class="form-control" placeholder="Email" required />
                <label>Gym Email</label>
              </div>

              <div class="form-floating mb-3">
                <input type="address" name="address" class="form-control" placeholder="Phone" />
                <label>Gym Address</label>
              </div>



            </div>
            <div class="col-md">


              <h2>Admin Details</h2>

              <div class="form-floating mb-3">
                <input type="text" name="firstname" class="form-control" placeholder="First Name" required />
                <label>First Name</label>
              </div>

              <div class="form-floating mb-3">
                <input type="text" name="lastname" class="form-control" placeholder="Last Name" required />
                <label>Last Name</label>
              </div>

              <div class="form-floating mb-3">
                <input type="text" name="phone" class="form-control" placeholder="Phone" />
                <label>Phone</label>
              </div>

              <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required />
                <label>Email</label>
              </div>              

              <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required />
                <label>Password</label>
              </div>
              <button type="submit" class="btn btn-primary btn-lg rounded-3">Register Gym</button>

            </div>
          </div>
        </form>
      </div>
    </div>
    </div>
  </main>



  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.addEventListener("load", () => {
      document.getElementById("loader").style.display = "none";
    });
  </script>
  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const data = Object.fromEntries(formData.entries());

      const res = await fetch("/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.success) {
        window.location.href = result.redirect;
      } else {
        alert(result.message);
      }
    });
  </script>
</body>
