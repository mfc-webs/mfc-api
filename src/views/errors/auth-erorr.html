<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Restricted</title>

<link rel="stylesheet" href="/assets/dashboard/css/stylesdash.css">

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.auth-card{
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:12px;
  text-align:center;
  max-width:420px;
  backdrop-filter:blur(12px);
}

.auth-card h1{
  font-size:28px;
  margin-bottom:10px;
}

.auth-card p{
  opacity:.8;
  margin-bottom:20px;
}

.auth-btn{
  background:#2563eb;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.auth-btn:hover{
  background:#1d4ed8;
}
</style>
</head>

<body>

<div class="auth-card">
  <h1>🔒 Access Restricted</h1>

  <p><%= message %></p>

  <button class="auth-btn" onclick="goLogin()">
    Go to Login
  </button>
</div>

<script>
function goLogin(){
  window.location="/login";
}
</script>

</body>
</html>
