    <script>

        const html = document.documentElement;
const toggleBtn = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');

   function setTheme(theme) {
  html.setAttribute('data-bs-theme', theme);
  localStorage.setItem('theme', theme);
  icon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
}

// Load theme
setTheme(localStorage.getItem('theme') || 'light');

toggleBtn.addEventListener('click', () => {
  const current = html.getAttribute('data-bs-theme');
  setTheme(current === 'light' ? 'dark' : 'light');
});
    </script>

    <script>
        const input = document.getElementById("searchInput");
        const resultsDiv = document.getElementById("results");

        let debounceTimer;

        input.addEventListener("input", () => {
            clearTimeout(debounceTimer);

            debounceTimer = setTimeout(async () => {
                const query = input.value;

                if (!query) {
                    resultsDiv.innerHTML = "No Search Results";
                    return;
                }

                const res = await fetch(`/admin/search-members?q=${query}`);
                const members = await res.json();

                renderResults(members);
            }, 500);
        });

        function renderResults(members) {
            resultsDiv.innerHTML = members.map(m => `
                <div class=" d-flex justify-content-between mb-3">
                <div>
                    <img src="${m.profile_image || '/images/profile-pic.jpg'}" class="rounded-circle" width="40" height="40"/>
                    <span>${m.firstname} ${m.lastname}</span>
                </div>
                <button onclick="checkIn(${m.id})" class="btn rounded-pill btn-success">Check In</button>
                </div>
            `).join("");
        }

const successSound = document.getElementById("successSound");
const errorSound = document.getElementById("errorSound");

async function checkIn(userId) {
  try {
    const res = await fetch("/admin/checkin", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user_id: userId })
    });

    const data = await res.json();

    if (data.ok) {
      successSound.currentTime = 0;
      successSound.play();

      showToast("✅ Checked in");

      // reset
      input.value = "";
      resultsDiv.innerHTML = "";
      input.focus();

    } else {
      errorSound.currentTime = 0;
      errorSound.play();

      showToast("⚠️ " + data.message);
    }

  } catch (err) {
    console.error(err);

    errorSound.currentTime = 0;
    errorSound.play();

    showToast("❌ Check-in failed");
  }
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function exitKiosk() {
    window.location.href = "/admin/insights";
}
</script>
